{% extends 'base.html' %}
{% block content %}

<div class="card" style="padding:28px">
  <h2 style="font-size:20px;font-weight:900;margin-bottom:20px">🌟 New Story</h2>
  <form method="POST" enctype="multipart/form-data" action="{{ url_for('create_story') }}">

    <label class="upload-label" for="story-input">
      <div class="upload-box" id="story-preview">
        <p style="font-size:48px">📸</p>
        <p style="font-weight:700;margin-top:8px">Click to choose photo</p>
        <p style="color:#9ca3af;font-size:13px;margin-top:4px">Disappears after 24 hours</p>
      </div>
      <input type="file" id="story-input" name="media" accept="image/*"
        required style="display:none" onchange="previewStory(this)"/>
    </label>

    <div style="display:flex;align-items:center;justify-content:space-between;
      background:#f9fafb;border-radius:12px;padding:14px 16px;margin-top:16px">
      <div>
        <p style="font-weight:700;font-size:14px">⭐ Close Friends Only</p>
        <p style="font-size:12px;color:#9ca3af">Only your close friends list can see this</p>
      </div>
      <label class="toggle">
        <input type="checkbox" name="close_friends" id="cf-toggle"/>
        <span class="slider"></span>
      </label>
    </div>

    <button type="submit" class="btn-grad"
      style="width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;
        font-size:15px;font-weight:800;cursor:pointer;color:#fff">
      Post Story 🌟
    </button>
  </form>
</div>

<script>
function previewStory(input) {
  if (input.files && input.files[0]) {
    var reader = new FileReader()
    reader.onload = function(e) {
      document.getElementById('story-preview').innerHTML =
        '<img src="' + e.target.result + '" style="width:100%;height:300px;object-fit:cover;border-radius:12px"/>'
    }
    reader.readAsDataURL(input.files[0])
  }
}
</script>
{% endblock %}
