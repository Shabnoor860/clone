{% extends 'base.html' %}
{% block content %}

<h2 style="font-size:20px;font-weight:900;margin-bottom:16px">🔖 Saved Posts</h2>

{% if posts %}
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px">
  {% for post in posts %}
  <div style="aspect-ratio:1/1;overflow:hidden;position:relative">
    <img src="/uploads/{{ post.image_url }}"
      style="width:100%;height:100%;object-fit:cover;cursor:pointer"/>
    <button onclick="savePost({{ post.id }}, this)"
      style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);
        border:none;border-radius:50%;width:28px;height:28px;
        font-size:14px;cursor:pointer;color:#fff">
      🔖
    </button>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="card" style="padding:40px;text-align:center">
  <p style="font-size:40px">🔖</p>
  <p style="font-weight:700;margin-top:8px">No saved posts yet</p>
  <p style="color:#9ca3af;font-size:13px;margin-top:4px">
    Tap the bookmark icon on any post to save it
  </p>
</div>
{% endif %}

{% endblock %}
